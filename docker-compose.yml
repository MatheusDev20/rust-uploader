services:
  db:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Superuser used only during container initialization
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # These are forwarded to our init.sh script to create the app user
      APP_DB_USER: ${DB_USER}
      APP_DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh

volumes:
  postgres_data:
